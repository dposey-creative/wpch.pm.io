<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — WP Custom Homes</title>
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
</head>
<body>

<div class="login-wrap">
  <div class="login-card">

    <div class="login-logo">
      <div class="login-mark">WP Custom Homes LLC</div>
      <div class="login-name">Project Command Center</div>
      <div class="login-sub">Sign in to access your dashboard</div>
    </div>

    <div class="login-divider"></div>

    <div class="login-err" id="login-err" role="alert"></div>

    <form id="login-form" novalidate>
      <div class="ff">
        <label class="fl" for="login-email">Email Address</label>
        <input class="fi" id="login-email" type="email" placeholder="you@wpcustomhomes.com" autocomplete="email" required/>
      </div>
      <div class="ff">
        <label class="fl" for="login-pass">Password</label>
        <input class="fi" id="login-pass" type="password" placeholder="••••••••" autocomplete="current-password" required/>
      </div>
      <button class="btn btn-gold login-btn" type="submit" id="login-btn">
        <i class="ti ti-lock-open"></i> Sign In
      </button>
    </form>

    <div class="login-foot">
      <a href="#" id="forgot-link">Forgot password?</a>
    </div>

  </div>
</div>

<script type="module" src="js/auth.js"></script>
</body>
</html>
